name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (resolved 2026-05-18)

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (resolved 2026-05-18)
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js 20
        # Required by tests/test_js_predicate_parity.py and the DELTA-20
        # shell-to-node parity tests in tests/test_canonicalization_vectors.py.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 (resolved 2026-05-18)
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Audit dependencies for CVEs
        # CVE-2026-4539 (pygments 2.19.2): no fix version available — see KNOWN_ISSUES.md
        run: pip install pip-audit && pip-audit --requirement requirements.lock --ignore-vuln CVE-2026-4539

      - name: Run tests
        run: pytest -v

  wheel-install-smoke:
    # Catches the schema-packaging class of bug: the editable install used by
    # the `test` job runs from the source tree, where repo-root schemas/ always
    # exists, so it cannot detect a wheel that ships without its schemas. This
    # job builds the wheel, installs it into a CLEAN venv, and loads schemas
    # from a directory with no repo-root schemas/ on the resolution path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (resolved 2026-05-18)

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (resolved 2026-05-18)
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel into a clean venv and load schemas from outside the tree
        run: |
          python -m venv /tmp/cleanenv
          /tmp/cleanenv/bin/pip install dist/*.whl
          cd /tmp  # no repo-root schemas/ on the path here
          /tmp/cleanenv/bin/python - <<'PY'
          import concordia.schema_validator as sv
          for fn in (
              "attestation.schema.json", "approval_receipt.schema.json",
              "fulfillment_attestation.schema.json", "receipt_bundle.schema.json",
              "reference.schema.json", "revocation_record.schema.json", "predicate.json",
          ):
              assert isinstance(sv._load_schema(fn), dict), fn
          from concordia.adapters.a2cn import dispute_resolved as dr
          assert isinstance(dr.DISPUTE_RESOLVED_SCHEMA, dict)
          print("wheel-install-smoke PASS:", sv._SCHEMAS_DIR)
          PY
