name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js 20
        # Required by tests/test_js_predicate_parity.py and the DELTA-20
        # shell-to-node parity tests in tests/test_canonicalization_vectors.py.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Audit dependencies for CVEs
        # CVE-2026-4539 (pygments 2.19.2): no fix version available — see KNOWN_ISSUES.md
        run: pip install pip-audit && pip-audit --requirement requirements.lock --ignore-vuln CVE-2026-4539

      - name: Run tests
        run: pytest -v
