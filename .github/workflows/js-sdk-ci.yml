name: JS SDK CI

on:
  push:
    branches: [main]
    paths: ['js-sdk/**']
  pull_request:
    paths: ['js-sdk/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 (resolved 2026-05-18)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 (resolved 2026-05-18)
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: js-sdk
        run: npm install
      - name: Typecheck
        working-directory: js-sdk
        run: npm run typecheck
      - name: Test
        working-directory: js-sdk
        run: npm test
      - name: Build
        working-directory: js-sdk
        run: npm run build
